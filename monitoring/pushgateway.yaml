apiVersion: apps/v1
kind: Deployment
metadata:
  name: pushgateway-deployment
  labels:
     app: pushgateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pushgateway
  template:
    metadata:
       labels:
         app: pushgateway
    spec:
      containers:
        - name: pushgateway
          image: prom/pushgateway
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9091
          # CHANGED: added health probes for failure visibility and auto-recovery.
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9091
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9091
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: pushgateway-service
spec:
  type: NodePort
  selector:
    app: pushgateway
  ports:
    - port: 9091
      targetPort: 9091
      name: pushgateway
      protocol: TCP
  externalIPs:
    - 192.168.1.240
