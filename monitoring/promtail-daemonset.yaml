apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail-service-account
      tolerations:
        # want to run on master node so we can monitor it as well
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
      containers:
        - name: promtail
          # CHANGED: pinned from floating latest tag.
          image: grafana/promtail:2.9.8
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/promtail/config-prom.yaml
          livenessProbe:
            httpGet:
              path: /ready
              port: 9080
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 9080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: config-volume
              mountPath: /etc/promtail
            - name: positions
              mountPath: /var/lib/promtail
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: config-volume
          configMap:
            name: promtail-config
        - name: positions
          hostPath:
            path: /var/lib/promtail
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
data:
  config-prom.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /var/lib/promtail/positions.yaml
    clients:
      - url: http://192.168.1.245:3100/loki/api/v1/push
    scrape_configs:
      # CHANGED: switch to static container log path for reliable scraping on containerd/docker.
      - job_name: kubernetes-containers
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-containers
              __path__: /var/log/containers/*.log
        pipeline_stages:
          - cri: {}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail-nodes-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list", "get", "watch"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail-service-account
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail-nodes-reader-binding
subjects:
  - kind: ServiceAccount
    name: promtail-service-account
    namespace: default
roleRef:
  kind: ClusterRole
  name: promtail-nodes-reader
  apiGroup: rbac.authorization.k8s.io
